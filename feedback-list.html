<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>All Feedback — Traversy Media</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="navbar-brand">Traversy Media</a>
      <ul class="navbar-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="feedback.html">Feedback</a></li>
        <li><a href="feedback-list.html" class="active">View Feedback</a></li>
        <li><a href="about.html">About</a></li>
      </ul>
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">
        <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5"/>
          <path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72 1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
        <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="display:none;">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>
  </nav>

  <main>
    <div class="container" style="padding-top:2.5rem;">

      <div class="section-heading">
        <h2>All Feedback</h2>
        <span class="badge" id="count-badge"></span>
      </div>

      <div class="feedback-grid" id="feedback-list">
        <!-- Populated by JS -->
      </div>

    </div>
  </main>

  <footer>
    <p>Copyright &copy; 2022 Abubakar Ibrahim Ibrahim</p>
  </footer>

  <script src="js/main.js"></script>
  <script>
    (function(){
      const toggle=document.getElementById('theme-toggle');
      const sun=toggle.querySelector('.sun-icon');
      const moon=toggle.querySelector('.moon-icon');
      const theme=localStorage.getItem('theme')||'light';
      if(theme==='dark'){document.documentElement.setAttribute('data-theme','dark');sun.style.display='none';moon.style.display='block';}
      toggle.addEventListener('click',()=>{
        const isDark=document.documentElement.getAttribute('data-theme')==='dark';
        if(isDark){document.documentElement.removeAttribute('data-theme');sun.style.display='block';moon.style.display='none';localStorage.setItem('theme','light');}
        else{document.documentElement.setAttribute('data-theme','dark');sun.style.display='none';moon.style.display='block';localStorage.setItem('theme','dark');}
      });
    })();

    // Update badge count after load
    const observer = new MutationObserver(() => {
      const cards = document.querySelectorAll('.feedback-card');
      const badge = document.getElementById('count-badge');
      if (cards.length > 0) badge.textContent = cards.length + ' entries';
    });
    observer.observe(document.getElementById('feedback-list'), { childList: true });
  </script>
</body>
</html>
