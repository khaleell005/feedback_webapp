<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feedback — Traversy Media</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="navbar-inner">
      <a href="index.html" class="navbar-brand">Traversy Media</a>
      <ul class="navbar-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="feedback.html" class="active">Feedback</a></li>
        <li><a href="feedback-list.html">View Feedback</a></li>
        <li><a href="about.html">About</a></li>
      </ul>
      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode">
        <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5"/>
          <path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72 1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
        <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="display:none;">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>
  </nav>

  <main>
    <div class="container">

      <!-- Hero -->
      <div class="page-hero">
        <div class="logo-circle">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <circle cx="7"  cy="8"  r="2.2" fill="currentColor"/>
            <circle cx="14" cy="8"  r="2.2" fill="currentColor"/>
            <circle cx="21" cy="8"  r="2.2" fill="currentColor"/>
            <circle cx="14" cy="15" r="2.2" fill="currentColor"/>
            <circle cx="14" cy="22" r="2.2" fill="currentColor"/>
          </svg>
        </div>
        <h1>Feedback</h1>
        <p>Leave feedback for Traversy Media</p>
      </div>

      <!-- Form card -->
      <div class="card" style="max-width:540px; margin:0 auto 4rem;">
        <form id="feedback-form" novalidate>

          <div class="form-group">
            <label for="name">Name</label>
            <input
              type="text"
              id="name"
              name="name"
              placeholder="Enter your name"
              autocomplete="name"
            />
            <span class="field-error" id="name-error"></span>
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="Enter your email"
              autocomplete="email"
            />
            <span class="field-error" id="email-error"></span>
          </div>

          <div class="form-group">
            <label for="message">Feedback</label>
            <textarea
              id="message"
              name="message"
              placeholder="Enter your feedback"
              rows="5"
            ></textarea>
            <span class="field-error" id="message-error"></span>
          </div>

          <button type="submit" class="btn btn-primary">Send Feedback</button>

        </form>
      </div>

    </div>
  </main>

  <footer>
    <p>Copyright &copy; 2022 Abubakar Ibrahim Ibrahim</p>
  </footer>

  <script src="js/main.js"></script>
  <script>
    (function(){
      const toggle=document.getElementById('theme-toggle');
      const sun=toggle.querySelector('.sun-icon');
      const moon=toggle.querySelector('.moon-icon');
      const theme=localStorage.getItem('theme')||'light';
      if(theme==='dark'){document.documentElement.setAttribute('data-theme','dark');sun.style.display='none';moon.style.display='block';}
      toggle.addEventListener('click',()=>{
        const isDark=document.documentElement.getAttribute('data-theme')==='dark';
        if(isDark){document.documentElement.removeAttribute('data-theme');sun.style.display='block';moon.style.display='none';localStorage.setItem('theme','light');}
        else{document.documentElement.setAttribute('data-theme','dark');sun.style.display='none';moon.style.display='block';localStorage.setItem('theme','dark');}
      });
    })();
  </script>
</body>
</html>
